<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNICOLLAB - Khu Vực Nhóm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f1f5f9;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 8px;
      }
      .kanban-col-wrapper {
        background-color: #f1f5f9;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
      }
      .kanban-col {
        min-height: 150px;
        min-width: 320px;
        max-width: 320px;
      }
      .task-card {
        cursor: grab;
        transition: all 0.2s ease-in-out;
        display: flex;
        flex-direction: column;
        min-height: 110px;
      }
      .task-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        border-color: #cbd5e1;
      }
      .task-card.dragging {
        opacity: 0.9;
        transform: rotate(3deg) scale(1.05);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
        z-index: 50;
        border-color: #3b82f6;
      }
      .drag-over {
        background-color: #e2e8f0 !important;
        border: 2px dashed #94a3b8 !important;
      }
      .modal-active {
        overflow: hidden;
      }
      .fade-in-section {
        animation: fadeIn 0.3s ease-out forwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tab-btn {
        color: #64748b;
        font-weight: 600;
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        cursor: pointer;
      }
      .tab-active {
        background-color: white !important;
        color: #1e293b !important;
        box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      }
      .notif-dropdown {
        max-height: 400px;
        overflow-y: auto;
      }
    </style>
  </head>
  <body class="h-screen flex flex-col overflow-hidden relative">
    <header
      class="bg-gray-900 border-b border-gray-800 shrink-0 shadow-md relative z-40"
    >
      <div
        class="max-w-[1600px] mx-auto px-4 sm:px-6 py-3 flex justify-between items-center"
      >
        <div class="flex items-center space-x-4">
          <a
            href="matching.html"
            class="text-gray-400 hover:text-white transition bg-gray-800 w-10 h-10 rounded-full flex items-center justify-center"
            ><i class="fa-solid fa-arrow-left"></i
          ></a>
          <div class="flex items-center space-x-2">
            <div class="text-orange-500 text-3xl font-bold">
              <i class="fa-solid fa-crown"></i>
            </div>
            <div>
              <h1
                class="text-lg font-extrabold text-white tracking-wider hidden sm:block leading-tight"
              >
                PROJECT WORKSPACE
              </h1>
            </div>
          </div>
        </div>
        <div class="flex items-center space-x-5">
          <div class="relative">
            <button
              onclick="toggleNotifDropdown(event)"
              class="text-gray-400 hover:text-white transition relative group p-2"
            >
              <i class="fa-regular fa-bell text-xl"></i>
              <span
                id="bellBadge"
                class="absolute top-0 right-0 bg-red-500 text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center border-2 border-gray-900 hidden animate-pulse"
                >0</span
              >
            </button>
            <div
              id="notifDropdown"
              class="hidden absolute right-0 mt-2 w-80 bg-white rounded-xl shadow-2xl border border-gray-200 z-50 notif-dropdown custom-scrollbar fade-in-section"
            >
              <div
                class="p-3 border-b border-gray-100 bg-gray-50 flex justify-between items-center sticky top-0"
              >
                <h4 class="font-bold text-gray-800 text-sm">Thông báo</h4>
              </div>
              <div id="notifList" class="divide-y divide-gray-50">
                <div class="p-4 text-center text-sm text-gray-500">
                  Chưa có thông báo nào
                </div>
              </div>
            </div>
          </div>
          <div
            class="flex items-center border border-gray-700 py-1.5 px-2 rounded-full bg-gray-800 shadow-sm cursor-pointer hover:bg-gray-700 transition"
            onclick="leaderLogout()"
            title="Đăng xuất"
          >
            <div
              id="leaderAvatar"
              class="w-7 h-7 bg-[#10b981] rounded-full flex items-center justify-center text-white font-bold text-xs overflow-hidden shrink-0 mr-2 shadow-sm"
            >
              U
            </div>
            <span
              id="leaderName"
              class="text-sm font-bold text-gray-200 hidden sm:block pr-2"
              >User</span
            >
          </div>
        </div>
      </div>
    </header>

    <div
      class="bg-white border-b border-gray-200 shrink-0 shadow-sm relative z-30"
    >
      <div
        class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col md:flex-row md:items-end justify-between gap-4"
      >
        <div
          class="flex flex-col sm:flex-row sm:items-center gap-4 w-full md:w-1/2"
        >
          <div class="w-full sm:w-auto relative">
            <div class="flex items-center space-x-3 mb-1">
              <span
                id="projCategory"
                class="text-xs font-bold text-[#2563eb] bg-blue-50 px-2.5 py-1 rounded-md border border-blue-100 uppercase"
                >Đang tải...</span
              >
              <span
                id="roleBadge"
                class="bg-purple-100 text-purple-700 px-2.5 py-1 rounded-md text-xs font-bold flex items-center"
                >...</span
              >
            </div>
            <div class="relative inline-block">
              <select
                id="projectSwitcher"
                onchange="changeProject(this.value)"
                class="text-2xl sm:text-3xl font-extrabold text-gray-800 bg-transparent border-none outline-none cursor-pointer hover:bg-gray-50 p-1 -ml-1 rounded-lg transition appearance-none pr-8 relative z-10 w-full max-w-[400px] truncate hidden"
              ></select>
              <h2
                id="projTitleEmpty"
                class="text-2xl sm:text-3xl font-extrabold text-gray-400"
              >
                Chưa tham gia dự án nào
              </h2>
              <i
                id="switcherIcon"
                class="fa-solid fa-chevron-down absolute right-2 top-1/2 transform -translate-y-1/2 text-gray-400 pointer-events-none hidden"
              ></i>
            </div>
          </div>
        </div>

        <div
          class="flex flex-wrap items-center justify-end gap-3 w-full md:w-auto shrink-0"
        >
          <div
            class="flex bg-gray-100 p-1 rounded-xl w-full sm:w-auto overflow-x-auto hide-scrollbar"
          >
            <button
              onclick="switchTab('board')"
              id="tab-board"
              class="tab-btn tab-active whitespace-nowrap"
            >
              <i
                class="fa-solid fa-table-columns mr-1.5 text-blue-600 hidden sm:inline"
              ></i>
              Kanban
            </button>
            <button
              onclick="switchTab('members')"
              id="tab-members"
              class="tab-btn whitespace-nowrap"
            >
              <i class="fa-solid fa-address-book mr-1.5 hidden sm:inline"></i>
              Thành viên
            </button>
            <button
              onclick="switchTab('candidates')"
              id="tab-candidates"
              class="tab-btn relative whitespace-nowrap"
            >
              <i class="fa-solid fa-users mr-1.5 hidden sm:inline"></i> Ứng
              viên<span
                id="candidateBadge"
                class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-4 h-4 flex items-center justify-center rounded-full animate-pulse border-2 border-white hidden"
                >0</span
              >
            </button>
            <button
              onclick="switchTab('settings')"
              id="tab-settings"
              class="tab-btn whitespace-nowrap"
            >
              <i class="fa-solid fa-gear mr-1.5 hidden sm:inline"></i> Cài đặt
            </button>
          </div>
          <button
            onclick="openChatModal()"
            class="bg-blue-100 hover:bg-blue-200 text-blue-700 font-bold py-2.5 px-4 rounded-xl transition flex items-center shadow-sm text-sm border border-blue-200 w-full sm:w-auto justify-center"
          >
            <i class="fa-solid fa-comment-dots mr-2 text-lg"></i> Chat Team
          </button>
        </div>
      </div>
    </div>

    <main class="flex-1 overflow-hidden relative flex flex-col bg-slate-50">
      <div
        id="content-board"
        class="h-full flex flex-col p-4 sm:px-6 lg:px-8 max-w-[1600px] mx-auto w-full"
      >
        <div class="flex justify-between items-center mb-6 shrink-0">
          <div class="relative w-72">
            <i
              class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 text-sm"
            ></i>
            <input
              type="text"
              placeholder="Tìm tên thẻ..."
              class="w-full pl-9 pr-3 py-2 bg-white border hover:border-gray-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-100 shadow-sm"
            />
          </div>
          <button
            id="addCardBtnMain"
            onclick="window.openTaskModal('col-todo')"
            class="bg-white border border-blue-200 text-blue-600 hover:bg-blue-50 px-4 py-2 rounded-xl text-sm font-bold shadow-sm flex items-center transition hidden"
          >
            <i class="fa-solid fa-plus mr-1.5"></i> Giao việc mới
          </button>
        </div>
        <div
          class="flex-1 flex gap-5 overflow-x-auto pb-4 custom-scrollbar items-start"
          id="kanbanContainer"
        ></div>
      </div>

      <div
        id="content-members"
        class="hidden h-full flex flex-col p-6 max-w-[1000px] mx-auto w-full overflow-y-auto custom-scrollbar"
      >
        <div
          class="flex justify-between items-center mb-6 border-b border-gray-100 pb-4"
        >
          <h2 class="text-2xl font-bold text-gray-800">Danh sách Thành viên</h2>
          <div class="bg-gray-100 rounded-lg p-1 flex text-sm font-bold">
            <button
              class="px-4 py-1.5 bg-white text-[#2563eb] shadow-sm rounded-md"
            >
              Tổng: <span id="memberCount">0</span>
            </button>
          </div>
        </div>
        <div
          id="fullMemberList"
          class="grid grid-cols-1 md:grid-cols-2 gap-4"
        ></div>
      </div>

      <div
        id="content-candidates"
        class="hidden h-full flex flex-col p-6 max-w-[1000px] mx-auto w-full overflow-y-auto custom-scrollbar"
      >
        <div
          class="flex justify-between items-center mb-6 border-b border-gray-100 pb-4"
        >
          <h2 class="text-2xl font-bold text-gray-800">
            Quản lý Đơn Ứng tuyển
          </h2>
          <div class="bg-gray-100 rounded-lg p-1 flex text-sm font-bold">
            <button
              class="px-4 py-1.5 bg-white text-[#2563eb] shadow-sm rounded-md"
            >
              Chờ duyệt (<span id="waitCount">0</span>)
            </button>
          </div>
        </div>
        <div id="candidateListContainer"></div>
        <div
          id="emptyCandidate"
          class="hidden flex-col items-center justify-center py-16 bg-gray-50 rounded-xl border border-gray-200 border-dashed"
        >
          <i class="fa-solid fa-inbox text-3xl text-gray-300 mb-3"></i>
          <p class="text-gray-500 font-medium">
            Chưa có đơn ứng tuyển nào gửi tới.
          </p>
        </div>
      </div>

      <div
        id="content-settings"
        class="hidden flex-1 h-full bg-white rounded-2xl shadow-sm border border-gray-200 p-8 fade-in-section overflow-y-auto custom-scrollbar"
      >
        <div class="max-w-3xl mx-auto">
          <h3
            class="text-2xl font-bold text-gray-800 mb-6 border-b border-gray-100 pb-4"
          >
            <i class="fa-solid fa-gear text-gray-400 mr-2"></i> Cài Đặt Dự Án
          </h3>
          <form onsubmit="saveProjectSettings(event)">
            <div class="space-y-6">
              <div>
                <label class="block text-sm font-bold text-gray-700 mb-2"
                  >Tên dự án hiện tại *</label
                ><input
                  type="text"
                  id="settingProjName"
                  required
                  class="w-full px-5 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none font-bold text-gray-800"
                />
              </div>
              <div>
                <label class="block text-sm font-bold text-gray-700 mb-2"
                  >Mô tả dự án *</label
                ><textarea
                  id="settingProjDesc"
                  rows="4"
                  required
                  class="w-full px-5 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none resize-none"
                ></textarea>
              </div>
              <div>
                <label class="block text-sm font-bold text-gray-700 mb-2"
                  >Lĩnh vực / Khoa</label
                >
                <select
                  id="settingCategory"
                  class="w-full px-5 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:ring-1 focus:ring-blue-500 transition appearance-none cursor-pointer"
                >
                  <option value="Công nghệ thông tin">
                    Công nghệ thông tin
                  </option>
                  <option value="Kinh tế - Quản trị">Kinh tế - Quản trị</option>
                  <option value="Nông nghiệp - Thú y">
                    Nông nghiệp - Thú y
                  </option>
                  <option value="Ngôn ngữ - Sư phạm">Ngôn ngữ - Sư phạm</option>
                  <option value="Đa ngành">Đa ngành</option>
                </select>
              </div>
              <button
                type="submit"
                class="bg-[#2563eb] text-white font-bold py-3.5 px-8 rounded-xl shadow-md hover:bg-blue-700 transition"
              >
                Lưu thay đổi
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <div
      id="taskModal"
      class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4"
    >
      <div
        class="bg-white rounded-3xl w-full max-w-xl overflow-hidden shadow-2xl relative flex flex-col p-6"
      >
        <h2 class="text-xl font-bold mb-4 border-b pb-2">
          <i class="fa-solid fa-clipboard-list text-blue-600 mr-2"></i> Giao
          việc cho Thành viên
        </h2>
        <form onsubmit="submitTask(event)" class="space-y-4">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1"
              >Tên công việc *</label
            >
            <input
              type="text"
              id="taskTitle"
              required
              placeholder="Ví dụ: Thiết kế giao diện trang chủ..."
              class="w-full px-4 py-3 border rounded-xl text-sm focus:ring-1 focus:ring-blue-500 outline-none"
            />
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1"
              >Giao cho *</label
            >
            <select
              id="taskAssignee"
              required
              class="w-full px-4 py-3 border rounded-xl text-sm focus:ring-1 focus:ring-blue-500 outline-none cursor-pointer bg-gray-50"
            ></select>
          </div>
          <div class="flex gap-2 pt-2">
            <button
              type="button"
              onclick="
                document.getElementById('taskModal').classList.add('hidden')
              "
              class="flex-1 py-3 bg-gray-100 text-gray-700 font-bold rounded-xl hover:bg-gray-200 transition"
            >
              Hủy
            </button>
            <button
              type="submit"
              class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition"
            >
              Tạo thẻ & Giao việc
            </button>
          </div>
        </form>
      </div>
    </div>

    <div
      id="submitWorkModal"
      class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4"
    >
      <div
        class="bg-white rounded-3xl w-full max-w-lg overflow-hidden shadow-2xl relative flex flex-col p-6"
      >
        <h2 class="text-xl font-bold mb-4 border-b pb-2">
          <i class="fa-solid fa-cloud-arrow-up text-green-500 mr-2"></i> Nộp kết
          quả công việc
        </h2>
        <form onsubmit="submitWorkForm(event)" class="space-y-4">
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1"
              >Link kết quả (Drive, Github, Docs...)</label
            >
            <input
              type="url"
              id="workLink"
              placeholder="https://..."
              class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-1 focus:ring-green-500 outline-none bg-gray-50"
            />
          </div>
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-1"
              >Lời nhắn cho Leader *</label
            >
            <textarea
              id="workMessage"
              required
              rows="3"
              placeholder="Em đã hoàn thành file báo cáo, anh xem qua nhé..."
              class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-1 focus:ring-green-500 outline-none bg-gray-50 custom-scrollbar"
            ></textarea>
          </div>
          <div class="flex gap-2 pt-2">
            <button
              type="button"
              onclick="
                document
                  .getElementById('submitWorkModal')
                  .classList.add('hidden')
              "
              class="flex-1 py-3 bg-gray-100 text-gray-700 font-bold rounded-xl hover:bg-gray-200 transition"
            >
              Hủy
            </button>
            <button
              type="submit"
              class="flex-1 py-3 bg-green-500 text-white font-bold rounded-xl hover:bg-green-600 transition"
            >
              Xác nhận Nộp
            </button>
          </div>
        </form>
      </div>
    </div>

    <div
      id="chatModal"
      class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-2 sm:p-5"
    >
      <div
        class="bg-white rounded-2xl w-full max-w-5xl h-[85vh] sm:h-[80vh] shadow-2xl flex overflow-hidden relative transition-all duration-300 scale-95 opacity-0"
        id="chatContent"
      >
        <div
          class="w-20 md:w-80 bg-gray-50 border-r border-gray-200 flex flex-col shrink-0"
        >
          <div class="p-4 border-b border-gray-200 hidden md:block bg-white">
            <h2 class="text-xl font-extrabold text-gray-800">Tin nhắn</h2>
          </div>
          <div class="flex-1 overflow-y-auto custom-scrollbar">
            <div
              class="chat-tab p-3 border-b border-gray-100 flex items-center gap-3 bg-blue-50 border-l-4 border-l-blue-600"
            >
              <div
                class="w-12 h-12 bg-gradient-to-tr from-blue-600 to-blue-400 rounded-full flex items-center justify-center text-white font-bold shrink-0 shadow-sm"
              >
                <i class="fa-solid fa-users"></i>
              </div>
              <div class="hidden md:block flex-1 min-w-0">
                <h4
                  class="text-sm font-bold text-gray-800 truncate"
                  id="chatGroupSidebarName"
                >
                  Team Project
                </h4>
              </div>
            </div>
          </div>
        </div>
        <div class="flex-1 flex flex-col bg-white h-full relative">
          <div
            class="h-16 border-b border-gray-200 flex justify-between items-center px-4 bg-white shrink-0 shadow-sm z-10"
          >
            <h3
              class="text-base font-extrabold text-gray-800"
              id="chatHeaderTitle"
            >
              Chat Nhóm
            </h3>
            <button
              onclick="closeChatModal()"
              class="w-8 h-8 bg-gray-100 text-gray-500 rounded-full flex items-center justify-center hover:bg-red-500 hover:text-white transition"
            >
              <i class="fa-solid fa-xmark text-lg"></i>
            </button>
          </div>
          <div
            class="flex-1 overflow-y-auto p-4 md:p-6 bg-[#f8fafc] custom-scrollbar"
            id="chatMessagesArea"
          ></div>
          <div class="p-3 bg-white border-t border-gray-200 shrink-0">
            <form
              onsubmit="sendChatMessage(event)"
              class="flex items-center gap-2 bg-gray-100 rounded-full p-1.5 border border-gray-200"
            >
              <input
                type="text"
                id="chatInputMessage"
                placeholder="Soạn tin nhắn..."
                autocomplete="off"
                class="flex-1 bg-transparent border-none px-4 py-2 text-sm outline-none text-gray-700"
              />
              <button
                type="submit"
                class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center hover:bg-blue-700 transition"
              >
                <i class="fa-solid fa-paper-plane"></i>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getFirestore,
        doc,
        setDoc,
        getDoc,
        updateDoc,
        collection,
        getDocs,
        onSnapshot,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDZckttPdycFw2zDsA4Zxbvj8EGRtoFHoU",
        authDomain: "unicollab-e81c0.firebaseapp.com",
        projectId: "unicollab-e81c0",
      };
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.currentTargetCol = "col-todo";
      window.currentProjTitle = "";
      window.teamMembers = [];
      window.globalApps = [];
      window.loggedInUserId = "";
      window.loggedInUserName = "";
      window.loggedInUserAvatar = "";
      window.isLeader = false;
      window.chatHistory = { team: [] };
      window.myProjectsList = [];

      document.addEventListener("DOMContentLoaded", async () => {
        const savedUser = JSON.parse(localStorage.getItem("userProfileData"));
        if (!savedUser) return (window.location.href = "index.html");

        window.loggedInUserId = savedUser.id;
        window.loggedInUserName = savedUser.name;
        window.loggedInUserAvatar = savedUser.avatarBase64 || "";

        if (window.loggedInUserAvatar) {
          document.getElementById("leaderAvatar").innerHTML =
            `<img src="${window.loggedInUserAvatar}" class="w-full h-full object-cover">`;
        } else {
          document.getElementById("leaderAvatar").innerText =
            window.loggedInUserName.charAt(0).toUpperCase();
        }
        document.getElementById("leaderName").innerText =
          window.loggedInUserName;

        try {
          const appSnap = await getDocs(collection(db, "applications"));
          const allApps = appSnap.docs.map((d) => d.data());

          const projSnap = await getDocs(collection(db, "projects"));
          const allProjects = projSnap.docs.map((d) => d.data());

          window.myProjectsList = [];
          allProjects.forEach((p) => {
            if (p.leaderId === window.loggedInUserId && p.isOwner) {
              window.myProjectsList.push({ ...p, isMyLeadership: true });
            } else {
              const myAcceptedApp = allApps.find(
                (a) =>
                  a.projectId === p.title &&
                  a.applicantId === window.loggedInUserId &&
                  a.status === "accepted",
              );
              if (myAcceptedApp) {
                window.myProjectsList.push({
                  ...p,
                  isMyLeadership: false,
                  myRole: myAcceptedApp.role,
                });
              }
            }
          });

          if (window.myProjectsList.length > 0) {
            const switcher = document.getElementById("projectSwitcher");
            switcher.innerHTML = "";
            window.myProjectsList.forEach((p) => {
              switcher.innerHTML += `<option value="${p.title}">${p.title} ${p.isMyLeadership ? "(Leader)" : "(Thành viên)"}</option>`;
            });
            switcher.classList.remove("hidden");
            document.getElementById("switcherIcon").classList.remove("hidden");
            document.getElementById("projTitleEmpty").classList.add("hidden");

            let activeTitle =
              localStorage.getItem("activeKanbanProject") ||
              window.myProjectsList[0].title;
            let pIndex = window.myProjectsList.findIndex(
              (p) => p.title === activeTitle,
            );
            if (pIndex === -1) {
              activeTitle = window.myProjectsList[0].title;
              pIndex = 0;
            }

            switcher.value = activeTitle;
            window.myProject = window.myProjectsList[pIndex];
            window.currentProjTitle = activeTitle;
            window.isLeader = window.myProject.isMyLeadership;

            document.getElementById("projCategory").innerText =
              window.myProject.category || "Đa ngành";
            document.getElementById("chatGroupSidebarName").innerText =
              window.myProject.title;

            if (document.getElementById("settingProjName")) {
              document.getElementById("settingProjName").value =
                window.myProject.title;
              document.getElementById("settingProjDesc").value =
                window.myProject.description;
              document.getElementById("settingCategory").value =
                window.myProject.category || "Đa ngành";
            }

            window.teamMembers = [
              {
                id: window.myProject.leaderId,
                name: window.myProject.leaderName,
                initial: window.myProject.leaderName.charAt(0).toUpperCase(),
                avatar: window.myProject.leaderAvatar || "",
                color: "green",
              },
            ];

            await loadTeamMembersFirebase();
            setupChatListener();
            setupKanbanListener();
            setupNotificationListener(); // LẮNG NGHE THÔNG BÁO TỪ THÀNH VIÊN

            if (window.isLeader) {
              document.getElementById("roleBadge").innerHTML =
                `<i class="fa-solid fa-crown mr-1.5"></i> Trưởng nhóm`;
              document
                .getElementById("addCardBtnMain")
                .classList.remove("hidden");
              await loadApplicationsFirebase();
            } else {
              document.getElementById("roleBadge").innerHTML =
                `<i class="fa-solid fa-user mr-1.5"></i> Thành viên`;
              applyPermissions();
            }
          } else {
            applyPermissions();
          }
        } catch (e) {
          console.error(e);
        }
      });

      window.changeProject = function (projTitle) {
        localStorage.setItem("activeKanbanProject", projTitle);
        location.reload();
      };

      function applyPermissions() {
        [
          "tab-candidates",
          "tab-settings",
          "addCardBtnMain",
          "addColumnBtn",
        ].forEach((id) => {
          if (document.getElementById(id))
            document.getElementById(id).classList.add("hidden");
        });
      }

      window.switchTab = function (tabName) {
        ["board", "members", "candidates", "settings"].forEach((id) => {
          const content = document.getElementById("content-" + id);
          const btn = document.getElementById("tab-" + id);
          if (content) content.classList.add("hidden");
          if (btn) btn.classList.remove("tab-active");
        });
        document
          .getElementById("content-" + tabName)
          .classList.remove("hidden");
        document.getElementById("tab-" + tabName).classList.add("tab-active");
      };

      // =====================================
      // KANBAN (GIAO VIỆC & NỘP BÀI)
      // =====================================
      window.isDragging = false;

      window.saveBoard = async function () {
        const container = document.getElementById("kanbanContainer");
        if (container && window.currentProjTitle) {
          await setDoc(doc(db, "kanban_boards", window.currentProjTitle), {
            html: container.innerHTML,
          });
        }
      };

      function setupKanbanListener() {
        onSnapshot(
          doc(db, "kanban_boards", window.currentProjTitle),
          (docSnap) => {
            const container = document.getElementById("kanbanContainer");
            if (window.isDragging) return;

            if (docSnap.exists() && docSnap.data().html) {
              container.innerHTML = docSnap.data().html;
              applyTaskPermissions(); // KIỂM TRA QUYỀN NỘP BÀI KHI UPDATE MỚI
            } else {
              renderDefaultBoard();
            }
            if (!document.getElementById("addColumnBtn") && window.isLeader) {
              container.insertAdjacentHTML("beforeend", getAddColumnHTML());
            }
          },
        );
      }

      function renderDefaultBoard() {
        const container = document.getElementById("kanbanContainer");
        container.innerHTML = `<div class="kanban-col-wrapper flex flex-col w-80 shrink-0 h-full max-h-full"><div class="p-3.5 border-b font-bold text-gray-700 text-sm">CẦN LÀM</div><div class="kanban-col flex-1 p-2.5 overflow-y-auto space-y-2.5" id="col-todo" ondrop="window.drop(event)" ondragover="window.allowDrop(event)"></div><div class="p-2"><button onclick="window.openTaskModal('col-todo')" class="w-full py-1.5 text-sm font-bold bg-white rounded-lg border shadow-sm ${!window.isLeader ? "hidden" : ""}">+ Thêm Thẻ</button></div></div><div class="kanban-col-wrapper flex flex-col w-80 shrink-0 h-full max-h-full"><div class="p-3.5 border-b font-bold text-gray-700 text-sm">ĐANG LÀM</div><div class="kanban-col flex-1 p-2.5 overflow-y-auto space-y-2.5" id="col-inprogress" ondrop="window.drop(event)" ondragover="window.allowDrop(event)"></div></div><div class="kanban-col-wrapper flex flex-col w-80 shrink-0 h-full max-h-full"><div class="p-3.5 border-b font-bold text-gray-700 text-sm">ĐÃ XONG</div><div class="kanban-col flex-1 p-2.5 overflow-y-auto space-y-2.5" id="col-done" ondrop="window.drop(event)" ondragover="window.allowDrop(event)"></div></div>`;
        window.saveBoard();
      }

      function getAddColumnHTML() {
        return `<div id="addColumnBtn" onclick="window.showAddColumnForm()" class="flex w-72 border-2 border-dashed border-gray-300 rounded-xl items-center justify-center cursor-pointer hover:bg-gray-50 h-12 mt-0"><span class="font-bold text-sm text-gray-500">+ Thêm danh sách</span></div><div id="addColumnForm" class="hidden flex-col w-72 bg-white border border-gray-200 rounded-2xl p-3"><input type="text" id="newColName" placeholder="Tên danh sách..." class="w-full px-3 py-2 border rounded-lg text-sm mb-3"><button onclick="window.submitNewColumn()" class="bg-blue-600 text-white font-bold py-2 rounded-lg text-sm">Thêm</button></div>`;
      }
      window.showAddColumnForm = function () {
        document
          .getElementById("addColumnBtn")
          .classList.replace("flex", "hidden");
        document
          .getElementById("addColumnForm")
          .classList.replace("hidden", "flex");
      };
      window.submitNewColumn = function () {
        const name = document.getElementById("newColName").value;
        if (!name) return;
        const colId = "col-" + Math.floor(Math.random() * 1000);
        const div = document.createElement("div");
        div.innerHTML = `<div class="kanban-col-wrapper flex flex-col w-80 shrink-0 h-full max-h-full"><div class="p-3.5 border-b font-bold text-purple-800 text-sm uppercase flex justify-between"><span>${name}</span><button onclick="this.parentElement.parentElement.remove(); window.saveBoard();" class="text-red-400"><i class="fa-solid fa-trash"></i></button></div><div class="kanban-col flex-1 p-2.5 overflow-y-auto space-y-2.5" id="${colId}" ondrop="window.drop(event)" ondragover="window.allowDrop(event)"></div><div class="p-2"><button onclick="window.openTaskModal('${colId}')" class="w-full py-1.5 text-sm font-bold bg-white rounded-lg border shadow-sm ${!window.isLeader ? "hidden" : ""}">+ Thêm Thẻ</button></div></div>`;
        document
          .getElementById("kanbanContainer")
          .insertBefore(
            div.firstChild,
            document.getElementById("addColumnBtn"),
          );
        document
          .getElementById("addColumnForm")
          .classList.replace("flex", "hidden");
        document
          .getElementById("addColumnBtn")
          .classList.replace("hidden", "flex");
        window.saveBoard();
      };

      window.draggedItem = null;
      window.drag = function (e) {
        window.isDragging = true;
        window.draggedItem = e.target;
        setTimeout(() => {
          window.draggedItem.classList.add("dragging");
        }, 0);
      };
      window.allowDrop = function (e) {
        e.preventDefault();
        const col = e.target.closest(".kanban-col");
        if (col) col.classList.add("drag-over");
      };
      window.drop = function (e) {
        e.preventDefault();
        const col = e.target.closest(".kanban-col");
        if (col && window.draggedItem) {
          col.classList.remove("drag-over");
          window.draggedItem.classList.remove("dragging");
          col.appendChild(window.draggedItem);
          applyTaskPermissions(); // Cập nhật lại nút Nộp bài khi kéo sang cột khác
          window.saveBoard();
        }
      };
      document.addEventListener("dragend", () => {
        window.isDragging = false;
        if (window.draggedItem) window.draggedItem.classList.remove("dragging");
        document
          .querySelectorAll(".drag-over")
          .forEach((el) => el.classList.remove("drag-over"));
      });

      // HÀM ẨN/HIỆN NÚT NỘP BÀI DỰA THEO ID NGƯỜI ĐANG ĐĂNG NHẬP
      window.applyTaskPermissions = function () {
        document.querySelectorAll(".task-card").forEach((card) => {
          const assignId = card.getAttribute("data-assignee-id");
          const submitBtn = card.querySelector(".submit-work-btn");
          if (submitBtn) {
            // Chỉ hiện nút Nộp bài nếu task giao cho mình VÀ chưa nằm ở cột ĐÃ XONG
            if (
              assignId === window.loggedInUserId &&
              !card.closest("#col-done")
            ) {
              submitBtn.classList.remove("hidden");
            } else {
              submitBtn.classList.add("hidden");
            }
          }
        });
      };

      window.openTaskModal = function (col) {
        if (!window.isLeader) return;
        window.currentTargetCol = col;

        // Đổ danh sách team vào dropdown Giao việc
        const assigneeSelect = document.getElementById("taskAssignee");
        assigneeSelect.innerHTML = window.teamMembers
          .map((m) => `<option value="${m.id}">${m.name}</option>`)
          .join("");

        document.getElementById("taskModal").classList.remove("hidden");
        document.getElementById("taskModal").classList.add("flex");
      };

      window.submitTask = function (e) {
        e.preventDefault();
        if (!window.isLeader) return;
        const title = document.getElementById("taskTitle").value;
        const assigneeId = document.getElementById("taskAssignee").value;
        const assignee = window.teamMembers.find((m) => m.id === assigneeId);

        const card = document.createElement("div");
        card.className =
          "task-card bg-white p-3.5 rounded-xl shadow-sm border border-gray-200 border-l-4 border-l-blue-500 group relative";
        card.draggable = true;
        card.ondragstart = window.drag;
        card.setAttribute("data-assignee-id", assigneeId); // LƯU ID NGƯỜI ĐƯỢC GIAO

        let avaHtml = assignee.avatar
          ? `<img src="${assignee.avatar}" class="w-6 h-6 rounded-full object-cover shadow-sm">`
          : `<div class="w-6 h-6 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold text-[10px]">${assignee.initial}</div>`;

        card.innerHTML = `
            <div class="flex justify-between items-start mb-2">
                <h4 class="font-bold text-sm text-gray-800">${title}</h4>
                <button onclick="this.closest('.task-card').remove(); window.saveBoard();" class="text-red-500 hidden group-hover:block transition"><i class="fa-solid fa-trash-can"></i></button>
            </div>
            <div class="mt-2 pt-2 border-t border-gray-50 flex justify-between items-center">
                <div class="flex items-center gap-2" title="Phụ trách: ${assignee.name}">
                    ${avaHtml} <span class="text-[10px] font-bold text-gray-500 line-clamp-1 max-w-[80px]">${assignee.name}</span>
                </div>
                <button class="submit-work-btn hidden text-[10px] font-bold bg-green-50 text-green-600 border border-green-200 px-2 py-1 rounded hover:bg-green-500 hover:text-white transition" onclick="window.openSubmitWorkModal(this)"><i class="fa-solid fa-check"></i> Nộp bài</button>
            </div>
            <div class="work-result hidden mt-3 pt-2 border-t border-dashed border-gray-200 text-xs bg-gray-50 p-2 rounded text-gray-600"></div>
        `;

        document.getElementById(window.currentTargetCol).appendChild(card);
        document.getElementById("taskModal").classList.add("hidden");
        e.target.reset();
        applyTaskPermissions(); // Hiển thị nút nộp bài luôn nếu leader tự giao cho mình
        window.saveBoard();
      };

      // NỘP BÀI (THÀNH VIÊN)
      window.currentTaskCard = null;
      window.openSubmitWorkModal = function (btn) {
        window.currentTaskCard = btn.closest(".task-card");
        document.getElementById("submitWorkModal").classList.remove("hidden");
        document.getElementById("submitWorkModal").classList.add("flex");
      };

      window.submitWorkForm = async function (e) {
        e.preventDefault();
        const link = document.getElementById("workLink").value;
        const msg = document.getElementById("workMessage").value;
        const taskTitle = window.currentTaskCard.querySelector("h4").innerText;

        // Di chuyển thẻ sang cột ĐÃ XONG
        const doneCol = document.getElementById("col-done");
        if (doneCol) doneCol.appendChild(window.currentTaskCard);

        // Ẩn nút nộp bài, hiện kết quả
        window.currentTaskCard
          .querySelector(".submit-work-btn")
          .classList.add("hidden");
        const resultDiv = window.currentTaskCard.querySelector(".work-result");
        let linkHtml = link
          ? `<a href="${link}" target="_blank" class="text-blue-600 font-bold hover:underline block mb-1"><i class="fa-solid fa-link mr-1"></i>Xem kết quả đính kèm</a>`
          : "";
        resultDiv.innerHTML = `${linkHtml}<span class="italic text-[11px]">"${msg}"</span>`;
        resultDiv.classList.remove("hidden");
        window.currentTaskCard.classList.replace(
          "border-l-blue-500",
          "border-l-green-500",
        ); // Đổi màu viền

        window.saveBoard();

        // GỬI THÔNG BÁO CHO LEADER QUA FIREBASE
        const notif = {
          id: Date.now().toString(),
          taskTitle: taskTitle,
          memberName: window.loggedInUserName,
          avatar: window.loggedInUserAvatar,
          time: new Date().toLocaleString("vi-VN"),
          message: msg,
          link: link,
          read: false,
        };

        try {
          const notifRef = doc(
            db,
            "project_notifications",
            window.currentProjTitle,
          );
          const notifSnap = await getDoc(notifRef);
          let notifs = [];
          if (notifSnap.exists() && notifSnap.data().items)
            notifs = notifSnap.data().items;
          notifs.push(notif);
          await setDoc(notifRef, { items: notifs });
        } catch (err) {
          console.error("Lỗi gửi thông báo: ", err);
        }

        document.getElementById("submitWorkModal").classList.add("hidden");
        e.target.reset();
      };

      // =====================================
      // HỆ THỐNG THÔNG BÁO (LEADER)
      // =====================================
      function setupNotificationListener() {
        if (!window.isLeader) return; // Chỉ leader mới nhận thông báo nộp bài

        onSnapshot(
          doc(db, "project_notifications", window.currentProjTitle),
          (docSnap) => {
            if (docSnap.exists() && docSnap.data().items) {
              const notifs = docSnap.data().items;
              const unread = notifs.filter((n) => !n.read).length;
              const bell = document.getElementById("bellBadge");

              if (unread > 0) {
                bell.innerText = unread;
                bell.classList.remove("hidden");
              } else {
                bell.classList.add("hidden");
              }

              renderNotificationDropdown(notifs.reverse()); // Đảo ngược để mới nhất lên trên
            }
          },
        );
      }

      window.toggleNotifDropdown = async function (e) {
        e.stopPropagation();
        const dropdown = document.getElementById("notifDropdown");
        dropdown.classList.toggle("hidden");

        // Nếu đang mở dropdown, tự động đánh dấu tất cả là Đã đọc
        if (!dropdown.classList.contains("hidden") && window.isLeader) {
          const notifRef = doc(
            db,
            "project_notifications",
            window.currentProjTitle,
          );
          const docSnap = await getDoc(notifRef);
          if (docSnap.exists() && docSnap.data().items) {
            let notifs = docSnap.data().items;
            let updated = false;
            notifs.forEach((n) => {
              if (!n.read) {
                n.read = true;
                updated = true;
              }
            });
            if (updated) await setDoc(notifRef, { items: notifs });
          }
        }
      };

      // Đóng dropdown khi click ra ngoài
      document.addEventListener("click", function (e) {
        const dropdown = document.getElementById("notifDropdown");
        if (
          dropdown &&
          !dropdown.classList.contains("hidden") &&
          !e.target.closest(".relative")
        ) {
          dropdown.classList.add("hidden");
        }
      });

      function renderNotificationDropdown(notifs) {
        const list = document.getElementById("notifList");
        if (notifs.length === 0) {
          list.innerHTML = `<div class="p-4 text-center text-sm text-gray-500">Chưa có thông báo nào</div>`;
          return;
        }

        list.innerHTML = notifs
          .map((n) => {
            let bg = n.read ? "bg-white" : "bg-blue-50";
            let ava = n.avatar
              ? `<img src="${n.avatar}" class="w-8 h-8 rounded-full object-cover">`
              : `<div class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold text-xs">${n.memberName.charAt(0)}</div>`;
            let linkHtml = n.link
              ? `<a href="${n.link}" target="_blank" class="mt-2 inline-block text-xs bg-white border border-gray-200 px-3 py-1 rounded hover:bg-gray-50 transition text-blue-600 font-bold"><i class="fa-solid fa-link mr-1"></i>Xem file</a>`
              : "";
            return `
              <div class="p-3 ${bg} hover:bg-gray-50 transition cursor-default">
                  <div class="flex items-start gap-3">
                      ${ava}
                      <div class="flex-1">
                          <p class="text-sm text-gray-800"><span class="font-bold">${n.memberName}</span> đã nộp bài cho thẻ: <span class="font-bold text-blue-600">${n.taskTitle}</span></p>
                          <p class="text-xs text-gray-500 mt-1 italic">"${n.message}"</p>
                          ${linkHtml}
                          <p class="text-[10px] text-gray-400 mt-1">${n.time}</p>
                      </div>
                  </div>
              </div>`;
          })
          .join("");
      }

      // =====================================
      // ỨNG VIÊN & THÀNH VIÊN TEAM
      // =====================================
      async function loadApplicationsFirebase() {
        try {
          const appSnap = await getDocs(collection(db, "applications"));
          window.globalApps = appSnap.docs
            .map((d) => d.data())
            .filter((a) => a.projectId === window.currentProjTitle);
          renderApplications();
        } catch (e) {}
      }

      function renderApplications() {
        const pendingApps = window.globalApps.filter(
          (app) => app.status === "pending",
        );
        const container = document.getElementById("candidateListContainer");
        const emptyState = document.getElementById("emptyCandidate");
        if (document.getElementById("candidateBadge")) {
          document
            .getElementById("candidateBadge")
            .classList.toggle("hidden", pendingApps.length === 0);
          document.getElementById("candidateBadge").innerText =
            pendingApps.length;
          document.getElementById("waitCount").innerText = pendingApps.length;
        }
        if (pendingApps.length > 0) {
          emptyState.classList.add("hidden");
          emptyState.classList.remove("flex");
          container.innerHTML = "";
          pendingApps.forEach((app) => {
            container.innerHTML += `<div class="bg-gray-50 border border-gray-200 rounded-xl p-5 shadow-sm mb-4"><div class="flex justify-between items-start mb-4"><div class="flex items-center space-x-4"><img src="${app.applicantAvatar || ""}" class="w-12 h-12 bg-indigo-100 rounded-full object-cover"><div><h4 class="font-bold text-gray-800 text-lg">${app.applicantName} <span class="text-[#2563eb] text-xs">(${app.role})</span></h4></div></div></div><div class="bg-white p-4 rounded-xl border border-gray-200 mb-4 text-sm italic">"${app.message}"</div><div class="flex justify-end space-x-3"><button onclick="window.handleRejectCandidate('${app.applicantId}')" class="px-5 py-2.5 bg-white border border-red-200 text-red-500 font-bold rounded-xl shadow-sm">Từ chối</button><button onclick="window.handleAcceptCandidate('${app.applicantId}')" class="px-6 py-2.5 bg-[#2563eb] text-white font-bold rounded-xl shadow-md">Duyệt vào Team</button></div></div>`;
          });
        } else {
          emptyState.classList.remove("hidden");
          emptyState.classList.add("flex");
          container.innerHTML = "";
        }
      }

      window.handleAcceptCandidate = async function (id) {
        const appId = `${window.currentProjTitle}_${id}`;
        try {
          await updateDoc(doc(db, "applications", appId), {
            status: "accepted",
          });
          const app = window.globalApps.find((a) => a.applicantId === id);
          window.teamMembers.push({
            id: id,
            name: app.applicantName,
            initial: app.applicantName.charAt(0).toUpperCase(),
            avatar: app.applicantAvatar || "",
            color: "indigo",
          });

          let projDoc = await getDoc(
            doc(db, "projects", window.currentProjTitle),
          );
          if (projDoc.exists()) {
            let pData = projDoc.data();
            await updateDoc(doc(db, "projects", window.currentProjTitle), {
              currentMembers: (pData.currentMembers || 1) + 1,
            });
          }

          await setDoc(doc(db, "project_teams", window.currentProjTitle), {
            members: window.teamMembers,
          });
          alert("Đã duyệt thành viên!");
          location.reload();
        } catch (e) {}
      };

      window.handleRejectCandidate = async function (id) {
        if (!confirm("Từ chối ứng viên này?")) return;
        try {
          await updateDoc(
            doc(db, "applications", `${window.currentProjTitle}_${id}`),
            { status: "rejected" },
          );
          location.reload();
        } catch (e) {}
      };

      async function loadTeamMembersFirebase() {
        try {
          const docSnap = await getDoc(
            doc(db, "project_teams", window.currentProjTitle),
          );
          if (docSnap.exists() && docSnap.data().members) {
            window.teamMembers = docSnap.data().members;
          }
          renderFullMemberList();
        } catch (error) {}
      }

      function renderFullMemberList() {
        document.getElementById("memberCount").innerText =
          window.teamMembers.length;
        const fullList = document.getElementById("fullMemberList");
        if (fullList) {
          fullList.innerHTML = window.teamMembers
            .map((m) => {
              let ava = m.avatar
                ? `<img src="${m.avatar}" class="w-full h-full object-cover">`
                : m.initial;
              return `<div class="flex items-center gap-4 bg-white p-4 rounded-xl border border-gray-200 shadow-sm"><div class="w-12 h-12 rounded-full bg-${m.color || "blue"}-100 text-${m.color || "blue"}-600 flex items-center justify-center font-bold text-lg overflow-hidden border border-gray-100 shadow-inner">${ava}</div><div><h4 class="font-bold text-gray-800">${m.name}</h4><p class="text-xs ${m.id === window.myProject.leaderId ? "text-orange-500 font-bold" : "text-gray-500"}">${m.id === window.myProject.leaderId ? '<i class="fa-solid fa-crown mr-1"></i> Trưởng nhóm' : "Thành viên"}</p></div></div>`;
            })
            .join("");
        }
      }

      // =====================================
      // CHAT TEAM (REAL-TIME SNAPSHOT)
      // =====================================
      function setupChatListener() {
        onSnapshot(
          doc(db, "project_chats", window.currentProjTitle),
          (docSnap) => {
            if (docSnap.exists() && docSnap.data().messages) {
              window.chatHistory.team = docSnap.data().messages;
              renderChatMessages();
            }
          },
        );
      }

      window.sendChatMessage = async function (e) {
        e.preventDefault();
        const input = document.getElementById("chatInputMessage");
        const msg = input.value.trim();
        if (!msg || !window.currentProjTitle) return;
        const time =
          ("0" + new Date().getHours()).slice(-2) +
          ":" +
          ("0" + new Date().getMinutes()).slice(-2);
        window.chatHistory.team.push({
          senderId: window.loggedInUserId,
          senderName: window.loggedInUserName,
          senderInitial: window.loggedInUserName.charAt(0).toUpperCase(),
          text: msg,
          time: time,
        });
        input.value = "";
        try {
          await setDoc(doc(db, "project_chats", window.currentProjTitle), {
            messages: window.chatHistory.team,
          });
        } catch (error) {}
      };

      function renderChatMessages() {
        const area = document.getElementById("chatMessagesArea");
        area.innerHTML = "";
        window.chatHistory.team.forEach((m) => {
          const isMe = m.senderId === window.loggedInUserId;
          if (isMe)
            area.innerHTML += `<div class="flex items-end gap-2 justify-end mb-5"><div class="flex flex-col items-end"><span class="text-[11px] text-gray-500 font-bold mb-1">Bạn</span><div class="bg-blue-600 text-white py-2 px-3.5 rounded-2xl rounded-br-none max-w-[85%] text-sm shadow-sm">${m.text}</div></div><div class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold text-xs shrink-0 border border-blue-200 shadow-sm">${m.senderInitial}</div></div>`;
          else
            area.innerHTML += `<div class="flex items-end gap-2 mb-5"><div class="w-8 h-8 bg-gray-200 text-gray-700 rounded-full flex items-center justify-center font-bold text-xs shrink-0 border border-gray-300 shadow-sm">${m.senderInitial}</div><div class="flex flex-col items-start"><span class="text-[11px] text-gray-500 font-bold mb-1">${m.senderName}</span><div class="bg-white border border-gray-200 text-gray-800 py-2 px-3.5 rounded-2xl rounded-bl-none max-w-[85%] text-sm shadow-sm">${m.text}</div></div></div>`;
        });
        area.scrollTop = area.scrollHeight;
      }

      window.openChatModal = function () {
        document.body.classList.add("modal-active");
        document.getElementById("chatModal").classList.remove("hidden");
        document.getElementById("chatModal").classList.add("flex");
        renderChatMessages();
        setTimeout(
          () =>
            document
              .getElementById("chatContent")
              .classList.remove("scale-95", "opacity-0"),
          10,
        );
      };
      window.closeChatModal = function () {
        document.body.classList.remove("modal-active");
        document
          .getElementById("chatContent")
          .classList.add("scale-95", "opacity-0");
        setTimeout(() => {
          document.getElementById("chatModal").classList.add("hidden");
          document.getElementById("chatModal").classList.remove("flex");
        }, 300);
      };

      window.saveProjectSettings = async function (e) {
        e.preventDefault();
        try {
          await updateDoc(doc(db, "projects", window.currentProjTitle), {
            title: document.getElementById("settingProjName").value,
            description: document.getElementById("settingProjDesc").value,
            category: document.getElementById("settingCategory").value,
          });
          alert("Đã lưu thông tin mới!");
          location.reload();
        } catch (err) {
          alert("Có lỗi xảy ra khi lưu thông tin.");
        }
      };

      window.leaderLogout = function () {
        localStorage.removeItem("userProfileData");
        window.location.href = "index.html";
      };
    </script>
  </body>
</html>
