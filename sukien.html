<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>UNICOLLAB - Sự Kiện Sinh Viên</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap");
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: #f9fafb;
        color: #1f2937;
      }
      .fade-in-section {
        animation: fadeIn 0.5s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .modal-active {
        overflow: hidden;
      }
      .nav-link {
        position: relative;
      }
      .nav-link::after {
        content: "";
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 2px;
        background-color: #2563eb;
        transition: width 0.3s;
      }
      .nav-link:hover::after,
      .nav-link.active::after {
        width: 100%;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #9ca3af;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body class="bg-[#f8fafc]">
    <header
      class="sticky top-0 z-40 bg-white/95 backdrop-blur-sm border-b border-gray-100 shadow-sm"
    >
      <div
        class="max-w-[1500px] mx-auto px-4 sm:px-5 py-3 flex flex-wrap items-center justify-between gap-y-3"
      >
        <div
          class="flex items-center gap-2 cursor-pointer shrink-0"
          onclick="window.location.href = 'matching.html'"
        >
          <div
            class="w-8 h-8 sm:w-10 sm:h-10 bg-blue-600 text-white rounded-xl flex items-center justify-center text-lg sm:text-xl font-bold"
          >
            <i class="fa-brands fa-uniregistry"></i>
          </div>
          <div class="flex flex-col">
            <span
              class="text-xl sm:text-2xl font-black text-gray-900 tracking-tighter"
              >UNI<span class="text-blue-600">COLLAB</span></span
            >
            <span
              class="text-[8px] sm:text-[10px] text-blue-800 font-bold -mt-1 uppercase tracking-widest"
              >NAU Edition</span
            >
          </div>
        </div>

        <div
          class="flex items-center gap-2 sm:gap-4 ml-auto md:order-3 shrink-0"
        >
          <div id="userProfileContainer" class="relative">
            <button
              class="flex items-center gap-2 sm:gap-3 p-1 sm:p-1.5 pl-2 sm:pl-3 border border-gray-200 rounded-full hover:border-blue-200 hover:bg-blue-50/50 transition"
              onclick="toggleUserDropdown(event)"
            >
              <span
                id="userName"
                class="text-xs sm:text-sm font-bold text-gray-700 hidden sm:block"
                >Đang tải...</span
              >
              <div
                id="userAvatar"
                class="w-7 h-7 sm:w-9 sm:h-9 bg-gray-300 rounded-full flex items-center justify-center font-bold text-white text-xs sm:text-sm border border-white shadow-sm overflow-hidden"
              ></div>
              <i
                class="fa-solid fa-chevron-down text-[10px] sm:text-xs text-gray-400 mr-1"
              ></i>
            </button>
            <div
              id="userDropdown"
              class="hidden absolute right-0 mt-3 w-56 sm:w-64 bg-white rounded-2xl shadow-xl border border-gray-100 p-3 z-50 fade-in-section"
            >
              <div class="space-y-1">
                <button
                  onclick="window.location.href = 'kanban.html'"
                  class="w-full flex items-center gap-3.5 text-left px-3 py-2.5 rounded-xl text-xs sm:text-sm font-medium text-gray-700 hover:bg-orange-50 hover:text-orange-700 transition"
                >
                  <i
                    class="fa-solid fa-users text-orange-500 w-4 text-center"
                  ></i>
                  Dự án của tôi
                </button>
                <div class="border-t border-gray-100 my-2 pt-2">
                  <button
                    onclick="userLogout()"
                    class="w-full flex items-center gap-3.5 text-left px-3 py-2.5 rounded-xl text-xs sm:text-sm font-medium text-red-600 hover:bg-red-50 transition"
                  >
                    <i
                      class="fa-solid fa-right-from-bracket w-4 text-center"
                    ></i>
                    Đăng xuất
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <nav
          class="flex items-center gap-5 sm:gap-7 overflow-x-auto hide-scrollbar w-full md:w-auto md:order-2 pb-1 md:pb-0 whitespace-nowrap"
        >
          <a
            href="matching.html"
            class="nav-link text-xs sm:text-sm font-semibold text-gray-600 hover:text-blue-600 transition"
            >Tìm đồng đội</a
          >
          <a
            href="#"
            onclick="alert('Tính năng đang được phát triển!')"
            class="nav-link text-xs sm:text-sm font-semibold text-gray-600 hover:text-blue-600 transition"
            >Ý tưởng mới</a
          >
          <a
            href="#"
            onclick="alert('Tính năng đang được phát triển!')"
            class="nav-link text-xs sm:text-sm font-semibold text-gray-600 hover:text-blue-600 transition"
            >Cẩm nang</a
          >
          <a
            href="sukien.html"
            class="nav-link active text-xs sm:text-sm font-semibold text-blue-600"
            >Sự kiện</a
          >
        </nav>
      </div>
    </header>

    <div
      class="bg-gradient-to-r from-blue-700 to-indigo-600 py-10 sm:py-16 relative overflow-hidden"
    >
      <div
        class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"
      ></div>
      <div
        class="max-w-[1500px] mx-auto px-4 sm:px-5 relative z-10 text-center"
      >
        <h1
          class="text-3xl sm:text-4xl md:text-5xl font-black text-white mb-3 sm:mb-4 tracking-tight shadow-sm"
        >
          BẢNG TIN SỰ KIỆN
        </h1>
        <p
          class="text-blue-100 text-sm sm:text-lg max-w-2xl mx-auto font-medium"
        >
          Cập nhật các cuộc thi, hội thảo và hoạt động ngoại khóa dành riêng cho
          sinh viên.
        </p>
      </div>
    </div>

    <section
      class="max-w-[1500px] mx-auto px-4 sm:px-5 py-6 sm:py-8 -mt-6 sm:-mt-8 relative z-20"
    >
      <div
        class="bg-white p-3 sm:p-4 rounded-2xl shadow-lg border border-gray-100 mb-8 sm:mb-10 max-w-3xl mx-auto flex items-center gap-3"
      >
        <div class="relative flex-1">
          <i
            class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"
          ></i>
          <input
            type="text"
            id="searchEventInput"
            oninput="filterEvents()"
            placeholder="Tìm kiếm sự kiện, hội thảo..."
            class="w-full pl-10 pr-4 py-2.5 sm:py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:ring-1 focus:ring-blue-500 transition"
          />
        </div>
      </div>

      <div
        id="eventsGrid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 sm:gap-6"
      >
        <div
          class="col-span-full text-center py-20 text-gray-500 flex flex-col items-center"
        >
          <i
            class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"
          ></i>
          <p class="font-bold">Đang tải sự kiện từ hệ thống...</p>
        </div>
      </div>
    </section>

    <div
      id="eventDetailModal"
      class="hidden fixed inset-0 bg-black/70 z-50 items-center justify-center p-3 sm:p-4 backdrop-blur-sm transition-opacity duration-300"
      onclick="closeEventModal()"
    >
      <div
        class="bg-white rounded-2xl sm:rounded-3xl shadow-2xl w-full sm:w-[95%] max-w-3xl max-h-[90vh] overflow-y-auto custom-scrollbar p-0 relative scale-95 opacity-0 transition-all duration-300 transform"
        onclick="event.stopPropagation()"
      >
        <button
          onclick="closeEventModal()"
          class="absolute top-3 sm:top-4 right-3 sm:right-4 w-8 h-8 sm:w-10 sm:h-10 bg-black/30 hover:bg-red-500 text-white rounded-full flex items-center justify-center transition z-10 backdrop-blur-md"
        >
          <i class="fa-solid fa-xmark text-sm sm:text-lg"></i>
        </button>

        <div
          id="modalEvCover"
          class="w-full h-48 sm:h-64 md:h-80 bg-gray-200 relative"
        >
          <img
            id="modalEvImg"
            src=""
            class="w-full h-full object-cover hidden"
          />
          <div
            id="modalEvPlaceholder"
            class="w-full h-full flex items-center justify-center bg-gradient-to-br from-blue-500 to-indigo-600 text-white text-4xl sm:text-5xl"
          >
            <i class="fa-solid fa-calendar-star"></i>
          </div>
          <div
            class="absolute bottom-0 left-0 w-full h-24 sm:h-32 bg-gradient-to-t from-black/80 to-transparent"
          ></div>
          <div
            class="absolute bottom-4 sm:bottom-5 left-4 sm:left-6 flex gap-2"
          >
            <span
              id="modalEvDate"
              class="bg-white/20 backdrop-blur-md text-white border border-white/30 px-2 sm:px-3 py-1 sm:py-1.5 rounded-lg text-[10px] sm:text-xs font-bold flex items-center"
              ><i class="fa-regular fa-calendar mr-2"></i> ...</span
            >
          </div>
        </div>

        <div class="p-5 sm:p-6 md:p-8">
          <h2
            id="modalEvTitle"
            class="text-xl sm:text-2xl md:text-3xl font-black text-gray-800 mb-4 sm:mb-6 leading-tight"
          >
            ...
          </h2>
          <div
            class="prose max-w-none text-gray-600 text-xs sm:text-sm leading-relaxed mb-6 sm:mb-8 whitespace-pre-line"
            id="modalEvDesc"
          >
            ...
          </div>

          <div
            id="modalEvVideoBox"
            class="hidden border-t border-gray-100 pt-5 mt-5 sm:pt-6 sm:mt-6"
          >
            <h4
              class="font-bold text-gray-800 mb-2 sm:mb-3 text-sm sm:text-base"
            >
              <i class="fa-brands fa-youtube text-red-500 mr-2"></i>Video Tham
              khảo
            </h4>
            <a
              id="modalEvVideoLink"
              href="#"
              target="_blank"
              class="inline-flex items-center justify-center w-full sm:w-auto bg-red-50 text-red-600 font-bold px-4 sm:px-5 py-2.5 sm:py-3 rounded-xl border border-red-100 hover:bg-red-500 hover:text-white transition shadow-sm text-xs sm:text-sm"
            >
              Xem Video Sự kiện
              <i
                class="fa-solid fa-arrow-up-right-from-square ml-2 text-[10px] sm:text-xs"
              ></i>
            </a>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        onSnapshot,
        getDoc,
        doc,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDZckttPdycFw2zDsA4Zxbvj8EGRtoFHoU",
        authDomain: "unicollab-e81c0.firebaseapp.com",
        projectId: "unicollab-e81c0",
      };
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.allEvents = [];

      document.addEventListener("DOMContentLoaded", async () => {
        const savedUser = localStorage.getItem("userProfileData");
        if (!savedUser) {
          window.location.href = "index.html";
          return;
        }

        const userData = JSON.parse(savedUser);
        let userName = userData.name;
        let userAvatar = userData.avatarBase64 || "";

        try {
          const userSnap = await getDoc(doc(db, "users", userData.id));
          if (userSnap.exists()) {
            userName = userSnap.data().name;
            userAvatar = userSnap.data().avatarBase64 || "";
          }
        } catch (e) {}

        document.getElementById("userName").innerText = userName;
        const avatarEl = document.getElementById("userAvatar");
        if (userAvatar) {
          avatarEl.innerHTML = `<img src="${userAvatar}" class="w-full h-full object-cover rounded-full">`;
        } else {
          avatarEl.classList.replace("bg-gray-300", "bg-blue-500");
          avatarEl.innerText = userName.charAt(0).toUpperCase();
        }

        loadEvents();
      });

      function loadEvents() {
        const eventsRef = collection(db, "events");
        onSnapshot(eventsRef, (snapshot) => {
          window.allEvents = [];
          snapshot.forEach((doc) => {
            window.allEvents.push(doc.data());
          });
          window.allEvents.sort(
            (a, b) => b.createdAt.seconds - a.createdAt.seconds,
          );
          renderEventsGrid();
        });
      }

      window.filterEvents = function () {
        renderEventsGrid();
      };

      function renderEventsGrid() {
        const grid = document.getElementById("eventsGrid");
        const keyword = document
          .getElementById("searchEventInput")
          .value.toLowerCase()
          .trim();

        let filtered = window.allEvents;
        if (keyword) {
          filtered = window.allEvents.filter(
            (ev) =>
              ev.title.toLowerCase().includes(keyword) ||
              ev.description.toLowerCase().includes(keyword),
          );
        }

        grid.innerHTML = "";

        if (filtered.length === 0) {
          grid.innerHTML = `<div class="col-span-full text-center py-16 sm:py-20 text-gray-400 flex flex-col items-center bg-white rounded-2xl sm:rounded-3xl border border-gray-100 shadow-sm mx-auto w-full"><i class="fa-solid fa-calendar-xmark text-5xl sm:text-6xl mb-3 sm:mb-4 opacity-50"></i><p class="font-bold text-base sm:text-lg text-gray-500">Chưa có sự kiện nào.</p></div>`;
          return;
        }

        filtered.forEach((ev) => {
          let coverHtml = ev.image
            ? `<img src="${ev.image}" class="w-full h-full object-cover transition duration-500 group-hover:scale-105">`
            : `<div class="w-full h-full flex items-center justify-center bg-gradient-to-tr from-blue-100 to-indigo-100 text-blue-300 text-4xl sm:text-5xl transition duration-500 group-hover:scale-105"><i class="fa-solid fa-image"></i></div>`;
          let videoBadge = ev.videoUrl
            ? `<div class="absolute top-2 sm:top-3 right-2 sm:right-3 bg-red-500 text-white w-6 h-6 sm:w-8 sm:h-8 rounded-full flex items-center justify-center shadow-lg z-10"><i class="fa-solid fa-play text-[10px] sm:text-xs ml-0.5"></i></div>`
            : "";
          let formattedDate = ev.date;
          if (ev.date && ev.date.includes("-")) {
            formattedDate = ev.date.split("-").reverse().join("/");
          }

          const card = document.createElement("div");
          card.className =
            "bg-white rounded-2xl sm:rounded-3xl border border-gray-100 shadow-sm hover:shadow-xl transition-all duration-300 overflow-hidden flex flex-col group cursor-pointer w-full";
          card.onclick = () => openEventModal(ev.id);

          card.innerHTML = `
                  <div class="h-40 sm:h-48 bg-gray-100 relative overflow-hidden shrink-0">
                      ${videoBadge}
                      ${coverHtml}
                      <div class="absolute bottom-0 left-0 w-full h-16 bg-gradient-to-t from-black/60 to-transparent"></div>
                      <div class="absolute bottom-2 sm:bottom-3 left-3 sm:left-4"><span class="bg-white/20 backdrop-blur-md text-white border border-white/30 px-2 sm:px-2.5 py-1 rounded-lg text-[9px] sm:text-[10px] font-bold uppercase tracking-wider"><i class="fa-regular fa-calendar mr-1.5"></i> ${formattedDate}</span></div>
                  </div>
                  <div class="p-4 sm:p-6 flex-1 flex flex-col">
                      <h3 class="text-base sm:text-lg font-bold text-gray-800 mb-2 sm:mb-3 line-clamp-2 group-hover:text-blue-600 transition leading-snug">${ev.title}</h3>
                      <p class="text-xs sm:text-sm text-gray-500 mb-4 sm:mb-5 line-clamp-3 leading-relaxed">${ev.description}</p>
                      <div class="mt-auto pt-3 sm:pt-4 border-t border-gray-50 flex justify-end">
                          <button class="text-blue-600 font-bold text-[10px] sm:text-xs hover:text-blue-800 transition flex items-center uppercase tracking-wider">Xem chi tiết <i class="fa-solid fa-arrow-right ml-1 sm:ml-2"></i></button>
                      </div>
                  </div>
              `;
          grid.appendChild(card);
        });
      }

      window.openEventModal = function (id) {
        const ev = window.allEvents.find((e) => e.id === id);
        if (!ev) return;
        document.getElementById("modalEvTitle").innerText = ev.title;
        document.getElementById("modalEvDesc").innerText = ev.description;
        let formattedDate = ev.date;
        if (ev.date && ev.date.includes("-"))
          formattedDate = ev.date.split("-").reverse().join("/");
        document.getElementById("modalEvDate").innerHTML =
          `<i class="fa-regular fa-clock mr-2"></i> ${formattedDate}`;

        const imgEl = document.getElementById("modalEvImg");
        const placeholderEl = document.getElementById("modalEvPlaceholder");
        if (ev.image) {
          imgEl.src = ev.image;
          imgEl.classList.remove("hidden");
          placeholderEl.classList.add("hidden");
        } else {
          imgEl.classList.add("hidden");
          placeholderEl.classList.remove("hidden");
        }

        const videoBox = document.getElementById("modalEvVideoBox");
        const videoLink = document.getElementById("modalEvVideoLink");
        if (ev.videoUrl) {
          videoLink.href = ev.videoUrl;
          videoBox.classList.remove("hidden");
        } else {
          videoBox.classList.add("hidden");
        }

        document.body.classList.add("modal-active");
        const m = document.getElementById("eventDetailModal");
        m.classList.remove("hidden");
        m.classList.add("flex");
        setTimeout(() => {
          m.children[0].classList.remove("scale-95", "opacity-0");
        }, 10);
      };

      window.closeEventModal = function () {
        const m = document.getElementById("eventDetailModal");
        m.children[0].classList.add("scale-95", "opacity-0");
        setTimeout(() => {
          m.classList.add("hidden");
          m.classList.remove("flex");
          document.body.classList.remove("modal-active");
        }, 300);
      };

      window.toggleUserDropdown = (e) => {
        e.stopPropagation();
        document.getElementById("userDropdown").classList.toggle("hidden");
      };
      document.addEventListener("click", (e) => {
        if (!document.getElementById("userProfileContainer").contains(e.target))
          document.getElementById("userDropdown").classList.add("hidden");
      });
      window.userLogout = function () {
        if (confirm("Đăng xuất khỏi hệ thống?")) {
          localStorage.removeItem("userProfileData");
          window.location.href = "index.html";
        }
      };
    </script>
  </body>
</html>
